<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POV STUDIOS — Team</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#0b0b0f;color:white;overflow-x:hidden}
html{scroll-behavior:smooth}

/* NAVBAR */
nav{
position:fixed;width:100%;padding:20px 60px;
display:flex;justify-content:space-between;align-items:center;
backdrop-filter:blur(10px);background:rgba(10,10,15,.5);
}
nav a{color:#aaa;text-decoration:none;margin-left:25px}
nav a:hover{color:white}

/* PAGE */
.section{padding:120px 40px;text-align:center}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin-top:40px}

/* CARDS */
.card{
width:250px;padding:25px;border-radius:14px;
background:#141420;border:1px solid #222;
transition:.4s;text-align:center;
}
.card:hover{
transform:translateY(-10px);
border-color:#5865F2;
box-shadow:0 20px 40px rgba(0,0,0,.6);
}
.icon{width:60px;margin-bottom:15px;filter:invert(1)}
.role{color:#5865F2;font-size:14px;margin-top:5px}
</style>
</head>

<body>

<nav>

<div>
