<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POV STUDIOS • Our Work</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
  background:#0b0f1a;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 80px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  z-index:999;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:40px;
  font-weight:600;
  transition:.3s;
}

nav a:hover{
  color:#00e0ff;
}

/* HEADER */
.header{
  padding-top:140px;
  text-align:center;
}

.header h1{
  font-size:50px;
  background:linear-gradient(90deg,#00e0ff,#9b5cff);
  -webkit-background-clip:text;
  color:transparent;
}

.header p{
  color:#aaa;
  margin-top:10px;
}

/* GRID PROJECTS */
.projects{
  padding:80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.project{
  background:#12182b;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  transition:.4s;
  cursor:pointer;
}

.project img{
  width:100%;
  height:190px;
  object-fit:cover;
  opacity:.85;
  transition:.4s;
}

.project:hover img{
  transform:scale(1.1);
  opacity:1;
}

.project-info{
  padding:20px;
}

.project h3{
  margin-bottom:6px;
}

.project p{
  color:#aaa;
  font-size:14px;
}

/* glow */
.project::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  box-shadow:0 0 25px rgba(0,224,255,.25);
  opacity:0;
  transition:.4s;
}

.project:hover::after{opacity:1}

/* DISCORD CTA */
.discord{
  text-align:center;
  padding:80px 20px 120px;
}

.discord a{
  padding:18px 40px;
  border-radius:40px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#5865F2,#00e0ff);
  font-weight:600;
  transition:.4s;
}

.discord a:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #5865F2;
}
</style>
</head>

<body>

<nav>
  <h2>POV STUDIOS</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="team.html">Team</a>
  </div>
</nav>

<div class="header">
  <h1>Our Work</h1>
  <p>Some of our latest creations and commissions</p>
</div>

<section class="projects">

<img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f">

</div>
</div>

</div>

<!-- 3 -->

</div>

</body>
</html>
