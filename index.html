<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POV STUDIOS</title>

<style>

/* =========================
   POV STUDIOS - CLEAN START
   ========================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0f;
  color: white;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f 60%);
}

.hero h1 {
  font-size: 80px;
  margin: 0;
  letter-spacing: 5px;
}

.hero p {
  color: #aaa;
  font-size: 18px;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 14px 22px;
  background: #5865F2;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: #7b84ff;
  transform: scale(1.05);
}

/* SECTION */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: #141420;
  border: 1px solid #222;
  padding: 20px;
  border-radius: 12px;
  max-width: 300px;
  margin: 20px auto;
  transition: 0.3s;
}

.card:hover {
  border-color: #5865F2;
  box-shadow: 0 0 20px rgba(88,101,242,0.25);
  transform: translateY(-5px);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #555;
}

</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>POV STUDIOS</h1>
  <p>Roblox Development Studio</p>

  <a class="btn" href="https://discord.gg/">Join Discord</a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>About Us</h2>

  <div class="card">
    We build Roblox experiences, systems and immersive roleplay worlds.
  </div>
</section>

<!-- PROJECTS -->
<section class="section">
  <h2>Projects</h2>

  <div class="card">
    Hall of Fame RP (in development)
  </div>

  <div class="card">
    Roblox Systems & UI Tools
  </div>
</section>

<!-- FOOTER -->
<footer>
POV STUDIOS © 2026
</footer>

</body>
</html>
